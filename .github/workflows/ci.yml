name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rules, deal & solvability tests
        run: node tools/test.js

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Headless UI smoke test
        run: |
          python3 -m http.server 8000 --bind 127.0.0.1 >/tmp/httpd.log 2>&1 &
          sleep 2
          CHROME="${{ steps.chrome.outputs.chrome-path }}"
          echo "Using Chrome at: $CHROME"
          OUT=$("$CHROME" --headless=new --no-sandbox --disable-gpu \
            --virtual-time-budget=20000 --window-size=1050,700 \
            --dump-dom "http://127.0.0.1:8000/tools/uitest.html")
          TITLE=$(echo "$OUT" | grep -oE '<title>[^<]*</title>' | head -1)
          echo "Result: $TITLE"
          echo "$OUT" | grep -q 'UITEST-PASS' || { echo "::error::UI smoke test failed"; exit 1; }
