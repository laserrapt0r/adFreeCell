name: Build Android AAB (TWA)

# Builds a signed Android App Bundle (.aab) for the Play Store from the PWA,
# using Bubblewrap (Trusted Web Activity). Run it manually from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of adfreecell-upload.jks  (base64 -w0 adfreecell-upload.jks)
#   ANDROID_KEYSTORE_PASSWORD keystore password
#   ANDROID_KEY_PASSWORD      key password (same as the keystore password here)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Version code (integer, must increase every upload)"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Bubblewrap is picky about the Android SDK: its validatePath() only accepts
      # a path that contains a `tools` OR `bin` folder, and it looks for build-tools
      # EXACTLY at build-tools/34.0.0. We set that up by hand (the official
      # setup-android layout with cmdline-tools/latest is rejected) and point
      # Bubblewrap at this SDK + the CI JDK via ~/.bubblewrap/config.json, so it
      # never prompts to download/accept a JDK or SDK.
      - name: Set up a Bubblewrap-compatible Android SDK
        run: |
          set -e
          export ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl -sSL -o /tmp/cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --sdk_root="$ANDROID_HOME" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null
          mkdir -p "$ANDROID_HOME/tools"   # marker so Bubblewrap's validatePath() accepts the SDK
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"

      - name: Set version in the TWA manifest
        working-directory: android
        run: |
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("twa-manifest.json", "utf8"));
            m.appVersionName = "${{ github.event.inputs.versionName }}";
            m.appVersionCode = parseInt("${{ github.event.inputs.versionCode }}", 10);
            m.appVersion = m.appVersionName;
            fs.writeFileSync("twa-manifest.json", JSON.stringify(m, null, 2));
          '

      - name: Decode & verify keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          printf '%s' "$KS_B64" | base64 -d > android/adfreecell-upload.jks 2>/dev/null \
            || { echo "::error::ANDROID_KEYSTORE_BASE64 is not valid base64 — re-paste the single long line from store/KEYSTORE-SECRETS.txt."; exit 1; }
          SZ=$(stat -c%s android/adfreecell-upload.jks)
          echo "Keystore decoded: $SZ bytes"
          if [ "$SZ" -lt 1000 ]; then
            echo "::error::Decoded keystore is only $SZ bytes (expected ~2744). The ANDROID_KEYSTORE_BASE64 secret is empty or truncated — re-paste the whole single line from store/KEYSTORE-SECRETS.txt."; exit 1
          fi
          keytool -list -keystore android/adfreecell-upload.jks -storepass "$KS_PASS" -alias upload >/dev/null 2>ks.err \
            || { echo "::error::Cannot open the keystore with ANDROID_KEYSTORE_PASSWORD (alias 'upload'). Check that secret. keytool said:"; cat ks.err; exit 1; }
          echo "Keystore verified OK (alias 'upload')."

      - name: Build & sign AAB
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # Fully non-interactive: `update --skipVersionUpgrade` regenerates the
        # project and writes manifest-checksum.txt using the manifest's version
        # verbatim (no bump, no versionName prompt). `build` then finds a valid
        # checksum and builds with no prompt at all. Both read </dev/null so any
        # unexpected prompt fails fast instead of hanging.
        run: |
          set -e
          # The runner pre-sets ANDROID_SDK_ROOT to its own SDK; Bubblewrap points
          # gradle at OUR SDK via ANDROID_HOME. Two different SDK paths make the
          # Android Gradle plugin abort, so pin both env vars to our SDK.
          export ANDROID_HOME="$HOME/android-sdk"
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          bubblewrap update --skipVersionUpgrade --skipPwaValidation </dev/null
          bubblewrap build --skipPwaValidation </dev/null
          echo "Built: $(grep -E 'versionName|versionCode' app/build.gradle | tr -s ' \n' ' ')"

      - name: Clean up keystore
        if: always()
        run: rm -f android/adfreecell-upload.jks

      - uses: actions/upload-artifact@v4
        with:
          name: adFreeCell-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          if-no-files-found: warn
