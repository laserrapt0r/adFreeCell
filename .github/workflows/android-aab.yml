name: Build Android AAB (TWA)

# Builds a signed Android App Bundle (.aab) for the Play Store from the PWA,
# using Bubblewrap (Trusted Web Activity). Run it manually from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of adfreecell-upload.jks  (base64 -w0 adfreecell-upload.jks)
#   ANDROID_KEYSTORE_PASSWORD keystore password
#   ANDROID_KEY_PASSWORD      key password (same as the keystore password here)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Version code (integer, must increase every upload)"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/adfreecell-upload.jks

      - name: Build & sign AAB
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # Bubblewrap self-installs its own JDK + Android SDK on first run and only
        # prompts interactively (for "versionName") while GENERATING the project.
        # Fighting that single prompt non-interactively is brittle, so we build in
        # two steps for an exact, deterministic version:
        #   1. `yes` accepts every prompt  ->  JDK/SDK download + a throwaway build
        #      (this leaves versionName="y", which we discard).
        #   2. patch the exact versionName/versionCode into the generated
        #      app/build.gradle, then rebuild the existing project — no prompts,
        #      no regeneration, so the patched version is what ships.
        run: |
          set -e
          yes | bubblewrap build --skipPwaValidation || true
          test -f app/build.gradle || { echo "::error::Bubblewrap did not generate the Android project"; exit 1; }
          sed -i 's/versionCode [0-9][0-9]*/versionCode ${{ github.event.inputs.versionCode }}/' app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "${{ github.event.inputs.versionName }}"/' app/build.gradle
          echo "Building: $(grep -E 'versionName|versionCode' app/build.gradle | tr -s ' \n' ' ')"
          rm -f app-release-bundle.aab app-release-signed.apk app-release-unsigned-aligned.apk
          bubblewrap build --skipPwaValidation </dev/null

      - name: Clean up keystore
        if: always()
        run: rm -f android/adfreecell-upload.jks

      - uses: actions/upload-artifact@v4
        with:
          name: adFreeCell-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          if-no-files-found: warn
