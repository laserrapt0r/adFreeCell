name: Build Android AAB (TWA)

# Builds a signed Android App Bundle (.aab) for the Play Store from the PWA,
# using Bubblewrap (Trusted Web Activity). Run it manually from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of adfreecell-upload.jks  (base64 -w0 adfreecell-upload.jks)
#   ANDROID_KEYSTORE_PASSWORD keystore password
#   ANDROID_KEY_PASSWORD      key password (same as the keystore password here)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Version code (integer, must increase every upload)"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Bubblewrap is very picky about the Android SDK: its validatePath() only
      # accepts a path that contains a `tools` OR `bin` folder, and it looks for
      # build-tools EXACTLY at build-tools/34.0.0. We set that up by hand (the
      # official setup-android layout with cmdline-tools/latest is rejected), and
      # point Bubblewrap at this SDK + the CI JDK via ~/.bubblewrap/config.json so
      # it never prompts to download/accept a JDK or SDK.
      - name: Set up a Bubblewrap-compatible Android SDK
        run: |
          set -e
          export ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl -sSL -o /tmp/cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --sdk_root="$ANDROID_HOME" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null
          mkdir -p "$ANDROID_HOME/tools"   # marker so Bubblewrap's validatePath() accepts the SDK
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/adfreecell-upload.jks

      - name: Build & sign AAB
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # Two-step build for an exact, deterministic version. Bubblewrap prompts
        # for versionName only while generating the project and can't be fed that
        # reliably, so:
        #   1. `yes` accepts the generate + versionName prompts -> a throwaway "y"
        #      build that also writes app/build.gradle and manifest-checksum.txt.
        #      (build-tools 34.0.0 is pre-installed, so no license prompt stalls it.)
        #   2. patch the exact versionName/versionCode into app/build.gradle, then
        #      rebuild. With a valid checksum Bubblewrap won't re-prompt; `printf n`
        #      answers the "regenerate project?" prompt with "no" just in case, and
        #      (unlike `yes |`) sends finite input so pipefail sees no SIGPIPE.
        run: |
          set -e
          yes | bubblewrap build --skipPwaValidation || true
          test -f app/build.gradle || { echo "::error::Bubblewrap did not generate the Android project"; exit 1; }
          sed -i 's/versionCode [0-9][0-9]*/versionCode ${{ github.event.inputs.versionCode }}/' app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "${{ github.event.inputs.versionName }}"/' app/build.gradle
          echo "Building: $(grep -E 'versionName|versionCode' app/build.gradle | tr -s ' \n' ' ')"
          rm -f app-release-bundle.aab app-release-signed.apk app-release-unsigned-aligned.apk
          printf 'n\n' | bubblewrap build --skipPwaValidation

      - name: Clean up keystore
        if: always()
        run: rm -f android/adfreecell-upload.jks

      - uses: actions/upload-artifact@v4
        with:
          name: adFreeCell-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          if-no-files-found: warn
