<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>vh test 2</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html { height: 100%; background: #cc0000; }        /* ROT   = html */
  body { height: 100%; overflow: hidden; background: #0000cc; }  /* BLAU = body */
  #app {
    height: 100dvh;
    height: var(--appvh, 100dvh);
    display: flex; flex-direction: column;
    background: #0a3d26;                              /* GRÜN  = #app (Filz) */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  #top { padding: 10px; color: #fff; font: 17px/1.45 monospace; background: rgba(255,255,255,.12); white-space: pre; }
  #mid { flex: 1 1 auto; }
  #bar {
    background: #ffd166; color: #000; font-weight: 800; text-align: center;
    padding: 12px; padding-bottom: 8px;   /* slim + close to the edge, like the game now */
  }
  #probe { position: fixed; bottom: 0; left: 0; width: 1px; height: env(safe-area-inset-bottom); }
</style>
</head>
<body>
  <div id="app">
    <div id="top">lädt…</div>
    <div id="mid"></div>
    <div id="bar">⬇ GELB muss ganz unten kleben ⬇</div>
  </div>
  <div id="probe"></div>
  <script>
    function fit() {
      var vv = window.visualViewport;
      document.documentElement.style.setProperty('--appvh',
        Math.round(vv ? vv.height : window.innerHeight) + 'px');
      var sb = Math.round(parseFloat(getComputedStyle(document.getElementById('probe')).height)) || 0;
      document.getElementById('top').textContent =
        'innerH=' + window.innerHeight + '   visualVP=' + (vv ? Math.round(vv.height) : '-') +
        '\n#app.clientH=' + document.getElementById('app').clientHeight + '   safe-bottom=' + sb +
        '\nFarbe UNTER dem Gelb? rot/blau/grün/keine';
    }
    fit();
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function () { setTimeout(fit, 300); });
    if (window.visualViewport) {
      visualViewport.addEventListener('resize', fit);
      visualViewport.addEventListener('scroll', fit);
    }
  </script>
</body>
</html>
