<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#188a52"/>
      <stop offset="0.55" stop-color="#0f5132"/>
      <stop offset="1" stop-color="#0a3d26"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9edf1"/>
    </linearGradient>
    <g id="fan-card">
      <rect x="192" y="240" width="140" height="196" rx="16" fill="#000" opacity="0.25" transform="translate(5 6)"/>
      <rect x="192" y="240" width="140" height="196" rx="16" fill="url(#card)"/>
    </g>
    <path id="heart" d="M0 14c-9-17-33-15-33 5 0 17 24 29 33 40 9-11 33-23 33-40 0-20-24-22-33-5z"/>
    <path id="spade" d="M0-22c-13 22-35 31-35 52 0 12 11 19 23 15-2 8-6 13-11 18h46c-5-5-9-10-11-18 12 4 23-3 23-15 0-21-22-30-35-52z"/>
    <path id="diamond" d="M0-26l22 32-22 32-22-32z"/>
  </defs>

  <!-- full-bleed background so the platform mask can crop any shape -->
  <rect width="512" height="512" fill="url(#felt)"/>

  <!-- content kept inside the ~80% maskable safe zone -->
  <g transform="translate(256 280) scale(0.72) translate(-262 -340)">
    <g transform="rotate(-19 262 452)">
      <use href="#fan-card" xlink:href="#fan-card"/>
      <use href="#heart" xlink:href="#heart" fill="#e23b4e" transform="translate(224 292) scale(0.82)"/>
    </g>
    <g transform="rotate(0 262 452)">
      <use href="#fan-card" xlink:href="#fan-card"/>
      <use href="#spade" xlink:href="#spade" fill="#1a1f26" transform="translate(226 300) scale(0.82)"/>
    </g>
    <g transform="rotate(19 262 452)">
      <use href="#fan-card" xlink:href="#fan-card"/>
      <use href="#diamond" xlink:href="#diamond" fill="#e23b4e" transform="translate(285 322) scale(1.5)"/>
    </g>
  </g>
</svg>
